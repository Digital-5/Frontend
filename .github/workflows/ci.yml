name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: Digital-5/D5
          path: D5

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: D5/Frontend/package-lock.json

      - name: Install dependencies
        working-directory: D5/Frontend
        run: npm ci

      - name: Lint
        working-directory: D5/Frontend
        run: npm run lint

      - name: Type check
        working-directory: D5/Frontend
        run: npm run typecheck

      - name: Tests
        working-directory: D5/Frontend
        run: npm test -- --watch=false

      - name: Tests
        run: npm test -- --watch=false
